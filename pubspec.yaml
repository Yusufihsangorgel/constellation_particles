name: constellation_particles
description: >-
  A pointer-reactive constellation particle background for Flutter. Particles
  drift, repel from the cursor, and link with fading lines. Near-O(n) spatial
  grid, zero runtime deps.
version: 0.3.0
repository: https://github.com/Yusufihsangorgel/constellation_particles
issue_tracker: https://github.com/Yusufihsangorgel/constellation_particles/issues
topics:
  - animation
  - particles
  - canvas
  - background
  - custompainter

screenshots:
  - description: >-
      The animated background in motion: points drifting across a dark canvas,
      each joined by a line to the neighbours near enough to reach.
    path: doc/demo.gif

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
